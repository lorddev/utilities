name: Publish NuGet package

on:
  release:
    types: [ created ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Build release
        run: dotnet build src/Devlord.Utilities/Devlord.Utilities.csproj --configuration Release
      - name: Pack prerelease with build number
        if: "github.event.release.prerelease"
        run: |
          dotnet pack --configuration Release --output ./nupkg \
            -p:VersionSuffix="preview.${{ github.run_number }}"
      - name: Pack release
        if: "!github.event.release.prerelease"
        run: dotnet pack --configuration Release --output ./nupkg
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: devlord
    
      - name: Publish packages to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package
